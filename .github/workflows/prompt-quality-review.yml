name: Prompt Quality Review

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9 AM UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  review-prompts:
    name: AI-Powered Prompt Quality Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Review prompts with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > review-prompts.mjs << 'EOF'
          import { GoogleGenerativeAI } from "@google/generative-ai";
          import { readFileSync, readdirSync } from "fs";

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash" });

          const promptFiles = readdirSync("prompts").filter(f => f.endsWith(".md"));
          const findings = [];

          for (const file of promptFiles) {
            const content = readFileSync(`prompts/${file}`, "utf-8");
            const review = await model.generateContent(`
              You are reviewing a prompt template for an agent-kernel project.
              The prompts should align with these principles:
              - People · Process · Technology (PPT) framework
              - Pareto (80/20) — focus on highest value
              - 30/60/90 mindset — time horizons
              - Bias towards action — outputs should be concrete and actionable
              - Rate of Improvement — measurement focus

              Review this prompt template and identify:
              1. Clarity issues (ambiguous instructions or variables)
              2. Principle alignment gaps (is it aligned with the design philosophy?)
              3. Output quality (is the expected output concrete enough?)
              4. One specific improvement suggestion

              Be concise. Maximum 4 bullet points total.

              Prompt file: ${file}

              Content:
              ${content.substring(0, 3000)}
            `);
            const text = review.response.text();
            if (text.toLowerCase().includes("issue") || text.toLowerCase().includes("improve") || text.toLowerCase().includes("unclear")) {
              findings.push({ file, feedback: text });
            }
          }

          if (findings.length > 0) {
            console.log("PROMPT_FINDINGS<<EOF");
            for (const f of findings) {
              console.log(`\n### ${f.file}\n${f.feedback}`);
            }
            console.log("EOF");
          } else {
            console.log("All prompts reviewed — no significant issues found.");
          }
          EOF
          node review-prompts.mjs > review_output.txt 2>&1
          cat review_output.txt

      - name: Create GitHub issue if findings exist
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('review_output.txt', 'utf8');
            if (output.includes('###')) {
              const today = new Date().toISOString().split('T')[0];
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Weekly Prompt Quality Review — ${today}`,
                body: `## Automated Prompt Quality Review\n\nGenerated by Gemini API.\n\n${output}`,
                labels: ['prompt-quality', 'automated']
              });
            }
