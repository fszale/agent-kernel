name: PR Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  agent-review:
    name: AI Review — Governance and Traceability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @google/generative-ai

      - name: Get diff of changed files
        run: |
          git diff origin/${{ github.base_ref }}...HEAD --name-only > changed-files.txt
          git diff origin/${{ github.base_ref }}...HEAD > pr-diff.txt
          echo "Changed files:"
          cat changed-files.txt

      - name: Run AI review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > pr-review.mjs << 'EOF'
          import { GoogleGenerativeAI } from "@google/generative-ai";
          import { readFileSync } from "fs";

          const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
          const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash" });

          const diff = readFileSync("pr-diff.txt", "utf-8").substring(0, 8000);
          const changedFiles = readFileSync("changed-files.txt", "utf-8");

          const review = await model.generateContent(`
            You are reviewing a pull request to the agent-kernel project.
            This project encodes design principles about governance, traceability, and agent behavior.

            Review the following diff for these specific issues:

            1. GOVERNANCE HIERARCHY: If new skills or prompts introduce governance concepts,
               do they follow the Objective→Strategy→Tactic→Action chain?

            2. TRACEABILITY: Do any new agent-spec YAML files include the required fields:
               - decision_rationale.universal_required_fields: [justification, reasoning_summary]
               - tactic_alignment or strategy_alignment fields on actions?

            3. FRONTMATTER COMPLETENESS: Do any new SKILL.md files have all required frontmatter?
               Required: name, description, when-to-use, principles

            4. BANNED PATTERNS: Are there any brand-specific references that shouldn't be in generic content?

            5. SCHEMA CONVENTIONS: Are naming conventions followed (kebab-case for files/directories)?

            Report findings in this format:
            ## ✅ Looks Good
            [issues that are NOT present — be brief]

            ## ⚠️ Suggestions
            [non-blocking improvements with file and line reference]

            ## ❌ Issues
            [blocking issues that must be fixed]

            Changed files: ${changedFiles}

            Diff:
            ${diff}
          `);

          console.log(review.response.text());
          EOF
          node pr-review.mjs > pr_review_output.txt 2>&1
          cat pr_review_output.txt

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewOutput = fs.readFileSync('pr_review_output.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Agent Kernel — Automated PR Review\n\n${reviewOutput}\n\n---\n*Generated by Gemini AI. Requires \`GEMINI_API_KEY\` secret.*`
            });
